name: "Allure Station Upload"
description: "Upload Allure results to an Allure Station instance, trigger report generation, and optionally wait for it."
branding:
  icon: "upload-cloud"
  color: "purple"
inputs:
  url:
    description: "Base URL of the Allure Station instance (e.g. https://allure.example.com)"
    required: true
  project:
    description: "Project id"
    required: true
  token:
    description: "API token for the project (required only if the project is token-protected)"
    required: false
    default: ""
  results:
    description: "Directory containing Allure result files"
    required: false
    default: "allure-results"
  environment:
    description: "Environment label attached to the run (e.g. staging, production)"
    required: false
    default: ""
  wait:
    description: "Wait for generation to reach a terminal status (ready/failed)"
    required: false
    default: "true"
  timeout:
    description: "Max seconds to wait when wait=true"
    required: false
    default: "300"
  comment:
    description: "On pull_request events, post a commit status + PR comment with the verdict"
    required: false
    default: "true"
  github-token:
    description: "Token for posting the PR status/comment (needs pull-requests:write + statuses:write)"
    required: false
    default: ${{ github.token }}
outputs:
  run-id:
    description: "The created run id"
    value: ${{ steps.run.outputs.run-id }}
  status:
    description: "Terminal status (ready|failed) when wait=true, otherwise 'generating'"
    value: ${{ steps.run.outputs.status }}
  report-url:
    description: "URL to the generated report"
    value: ${{ steps.run.outputs.report-url }}
runs:
  using: "composite"
  steps:
    - id: run
      shell: bash
      env:
        URL: ${{ inputs.url }}
        PROJECT: ${{ inputs.project }}
        TOKEN: ${{ inputs.token }}
        RESULTS: ${{ inputs.results }}
        WAIT: ${{ inputs.wait }}
        TIMEOUT: ${{ inputs.timeout }}
        # CI metadata, auto-derived from the GitHub context (head_ref on PRs, ref_name on pushes).
        BRANCH: ${{ github.head_ref || github.ref_name }}
        COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        CI_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        ENVIRONMENT: ${{ inputs.environment }}
      run: |
        set -euo pipefail
        base="${URL%/}"
        # Build auth args as an array; expand with the ${arr[@]+...} guard so an empty array is safe
        # under `set -u` on older bash (<4.4 / macOS system bash) — the common open-project path.
        auth=(); [ -n "$TOKEN" ] && auth=(-H "Authorization: Bearer $TOKEN")
        AUTH=("${auth[@]+"${auth[@]}"}")

        # Attach CI metadata as form fields (only the ones that are set).
        meta=()
        [ -n "${BRANCH:-}" ]      && meta+=(-F "branch=$BRANCH")
        [ -n "${COMMIT:-}" ]      && meta+=(-F "commit=$COMMIT")
        [ -n "${ENVIRONMENT:-}" ] && meta+=(-F "environment=$ENVIRONMENT")
        [ -n "${CI_URL:-}" ]      && meta+=(-F "ciUrl=$CI_URL")

        # Collect result files into curl -F args.
        shopt -s nullglob
        curlfiles=()
        for f in "$RESULTS"/*; do [ -f "$f" ] && curlfiles+=(-F "files=@$f"); done
        if [ ${#curlfiles[@]} -eq 0 ]; then echo "::error::no result files in $RESULTS"; exit 1; fi

        # Upload → stages a pending run; capture its id.
        resp=$(curl -fsS "${AUTH[@]+"${AUTH[@]}"}" "${meta[@]+"${meta[@]}"}" "${curlfiles[@]}" "$base/api/projects/$PROJECT/send-results")
        run_id=$(echo "$resp" | jq -r .runId)
        echo "run-id=$run_id" >> "$GITHUB_OUTPUT"
        report_url="$base/api/projects/$PROJECT/runs/$run_id/report/index.html"
        echo "report-url=$report_url" >> "$GITHUB_OUTPUT"
        echo "Uploaded ${#curlfiles[@]} file(s); run $run_id"

        # Generate THIS run specifically (?runId) so concurrent uploads don't claim each other's run.
        curl -fsS -X POST "${AUTH[@]+"${AUTH[@]}"}" "$base/api/projects/$PROJECT/generate?runId=$run_id" >/dev/null

        status="generating"
        if [ "$WAIT" = "true" ]; then
          deadline=$(( $(date +%s) + TIMEOUT ))
          while :; do
            status=$(curl -fsS "${AUTH[@]+"${AUTH[@]}"}" "$base/api/projects/$PROJECT/runs/$run_id" | jq -r .status)
            [ "$status" = "ready" ]  && { echo "✅ report ready: $report_url"; break; }
            [ "$status" = "failed" ] && { echo "::error::generation failed for run $run_id"; break; }
            if [ "$(date +%s)" -ge "$deadline" ]; then echo "::warning::timed out after ${TIMEOUT}s (status=$status)"; break; fi
            sleep 3
          done
        fi
        echo "status=$status" >> "$GITHUB_OUTPUT"
        [ "$status" = "failed" ] && exit 1 || true

    - name: PR status + comment
      # Runs on success or failure (but not cancellation) so the PR reflects a failed run too.
      if: ${{ !cancelled() && github.event_name == 'pull_request' && inputs.comment == 'true' }}
      uses: actions/github-script@v7
      env:
        AS_URL: ${{ inputs.url }}
        AS_PROJECT: ${{ inputs.project }}
        AS_RUN_ID: ${{ steps.run.outputs.run-id }}
        AS_TOKEN: ${{ inputs.token }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const base = process.env.AS_URL.replace(/\/$/, "");
          const project = process.env.AS_PROJECT;
          const runId = process.env.AS_RUN_ID;
          if (!runId) { core.warning("no run id; skipping PR status/comment"); return; }
          const headers = process.env.AS_TOKEN ? { authorization: `Bearer ${process.env.AS_TOKEN}` } : {};
          const get = async (p) => { const r = await fetch(`${base}${p}`, { headers, signal: AbortSignal.timeout(15000) }); if (!r.ok) throw new Error(`${p} → ${r.status}`); return r.json(); };
          const summary = await get(`/api/projects/${project}/runs/${runId}/summary`);
          const s = summary.run.stats ?? { total: 0, passed: 0, failed: 0, broken: 0, skipped: 0, flaky: 0 };
          const gate = summary.qualityGate;
          let delta = "";
          if (summary.previousReadyRunId) {
            try {
              const c = await get(`/api/projects/${project}/compare?base=${summary.previousReadyRunId}&target=${runId}`);
              delta = `\n**Δ vs previous:** ${c.newlyFailing.length} new failing · ${c.fixed.length} fixed · ${c.flaky.length} flaky`;
            } catch (e) { core.warning(`compare failed: ${e}`); }
          }
          const ok = summary.run.status === "ready" && (!gate.configured || gate.passed);
          const reportUrl = `${base}${summary.reportPath}`;
          const gateLine = gate.configured
            ? `\n**Quality gate:** ${gate.passed ? "✅ pass" : "❌ fail"}${gate.checks.length ? " — " + gate.checks.map((c) => `${c.rule} ${c.ok ? "✓" : "✗"}`).join(", ") : ""}`
            : "";
          const marker = `<!-- allure-station:${project} -->`;
          const body = `${marker}\n### Allure report — ${ok ? "✅ passed" : "❌ failed"}\n`
            + `${s.passed}/${s.total} passed · ${s.failed} failed · ${s.broken} broken · ${s.skipped} skipped${s.flaky ? ` · ${s.flaky} flaky` : ""}`
            + gateLine + delta + `\n\n[View report](${reportUrl})`;
          const sha = context.payload.pull_request.head.sha;
          await github.rest.repos.createCommitStatus({ ...context.repo, sha, state: ok ? "success" : "failure", context: `allure/${project}`, target_url: reportUrl, description: `${s.passed}/${s.total} passed` });
          const issue_number = context.payload.pull_request.number;
          const comments = await github.paginate(github.rest.issues.listComments, { ...context.repo, issue_number, per_page: 100 });
          const existing = comments.find((c) => c.body && c.body.includes(marker));
          if (existing) await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
          else await github.rest.issues.createComment({ ...context.repo, issue_number, body });
          if (!ok) core.setFailed(`Allure: ${summary.run.status !== "ready" ? "generation failed" : "quality gate failed"}`);
