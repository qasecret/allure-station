name: "Allure Station Upload"
description: "Upload Allure results to an Allure Station instance, trigger report generation, and optionally wait for it."
branding:
  icon: "upload-cloud"
  color: "purple"
inputs:
  url:
    description: "Base URL of the Allure Station instance (e.g. https://allure.example.com)"
    required: true
  project:
    description: "Project id"
    required: true
  token:
    description: "API token for the project (required only if the project is token-protected)"
    required: false
    default: ""
  results:
    description: "Directory containing Allure result files"
    required: false
    default: "allure-results"
  wait:
    description: "Wait for generation to reach a terminal status (ready/failed)"
    required: false
    default: "true"
  timeout:
    description: "Max seconds to wait when wait=true"
    required: false
    default: "300"
outputs:
  run-id:
    description: "The created run id"
    value: ${{ steps.run.outputs.run-id }}
  status:
    description: "Terminal status (ready|failed) when wait=true, otherwise 'generating'"
    value: ${{ steps.run.outputs.status }}
  report-url:
    description: "URL to the generated report"
    value: ${{ steps.run.outputs.report-url }}
runs:
  using: "composite"
  steps:
    - id: run
      shell: bash
      env:
        URL: ${{ inputs.url }}
        PROJECT: ${{ inputs.project }}
        TOKEN: ${{ inputs.token }}
        RESULTS: ${{ inputs.results }}
        WAIT: ${{ inputs.wait }}
        TIMEOUT: ${{ inputs.timeout }}
      run: |
        set -euo pipefail
        base="${URL%/}"
        auth=(); [ -n "$TOKEN" ] && auth=(-H "Authorization: Bearer $TOKEN")

        # Collect result files into curl -F args.
        shopt -s nullglob
        curlfiles=()
        for f in "$RESULTS"/*; do [ -f "$f" ] && curlfiles+=(-F "files=@$f"); done
        if [ ${#curlfiles[@]} -eq 0 ]; then echo "::error::no result files in $RESULTS"; exit 1; fi

        # Upload → stages a pending run; capture its id.
        resp=$(curl -fsS "${auth[@]}" "${curlfiles[@]}" "$base/api/projects/$PROJECT/send-results")
        run_id=$(echo "$resp" | jq -r .runId)
        echo "run-id=$run_id" >> "$GITHUB_OUTPUT"
        report_url="$base/api/projects/$PROJECT/runs/$run_id/report/index.html"
        echo "report-url=$report_url" >> "$GITHUB_OUTPUT"
        echo "Uploaded $(( ${#curlfiles[@]} )) file(s); run $run_id"

        # Trigger generation (fire-and-forget; returns 202 generating).
        curl -fsS -X POST "${auth[@]}" "$base/api/projects/$PROJECT/generate" >/dev/null

        status="generating"
        if [ "$WAIT" = "true" ]; then
          deadline=$(( $(date +%s) + TIMEOUT ))
          while :; do
            status=$(curl -fsS "${auth[@]}" "$base/api/projects/$PROJECT/runs/$run_id" | jq -r .status)
            [ "$status" = "ready" ]  && { echo "✅ report ready: $report_url"; break; }
            [ "$status" = "failed" ] && { echo "::error::generation failed for run $run_id"; break; }
            if [ "$(date +%s)" -ge "$deadline" ]; then echo "::warning::timed out after ${TIMEOUT}s (status=$status)"; break; fi
            sleep 3
          done
        fi
        echo "status=$status" >> "$GITHUB_OUTPUT"
        [ "$status" = "failed" ] && exit 1 || true
