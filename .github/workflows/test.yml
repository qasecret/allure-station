name: Test
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      # Key ties to the @playwright/test version pinned in packages/e2e/package.json —
      # bump it together with that pin. On a warm cache the install step below
      # skips the browser download and only apt-installs system deps.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.48.0
      - run: pnpm --filter @allure-station/e2e exec playwright install --with-deps chromium
      - run: pnpm --filter @allure-station/e2e test:e2e
