services:
  allure-station:
    build: { context: .., dockerfile: docker/Dockerfile }
    ports: ["5050:5050"]
    volumes: ["allure-data:/data"]
    # --- Admin credentials (seeded on first boot, upserted on restart) ---
    # No admin is created unless you explicitly set both env vars.
    # Override via shell:  ADMIN_EMAIL=me@co.com ADMIN_PASSWORD=s3cret docker compose up
    # environment:
    #   ADMIN_EMAIL: me@co.com
    #   ADMIN_PASSWORD: s3cret
    # Default: zero-config, single-container, in-process job queue.
    #
    # --- To use S3/MinIO as the storage backend, uncomment and add to the environment block: ---
    #   STORAGE_DRIVER: s3
    #   S3_ENDPOINT: http://minio:9000
    #   S3_BUCKET: allure
    #   S3_ACCESS_KEY_ID: minio
    #   S3_SECRET_ACCESS_KEY: minio12345
    #
    # --- To use Postgres as the metadata backend (requires --profile postgres): ---
    #   DB_DRIVER: postgres
    #   DATABASE_URL: postgresql://allure:allure@postgres:5432/allure
    #
    # --- To switch the API to BullMQ mode (requires --profile bullmq AND shared DB + storage): ---
    # NOTE: bullmq mode requires shared DB (Postgres) and shared storage (S3 or shared volume)
    # because the api and worker processes run separately and touch the same run rows + report files.
    # Steps:
    #   1. Enable the bullmq profile: docker compose --profile bullmq --profile postgres up
    #   2. Uncomment the lines below and configure DB + storage as well:
    #   QUEUE_DRIVER: bullmq
    #   REDIS_URL: redis://redis:6379

  minio:
    profiles: ["minio"]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]

  postgres:
    profiles: ["postgres"]
    image: postgres:16
    environment:
      POSTGRES_USER: allure
      POSTGRES_PASSWORD: allure
      POSTGRES_DB: allure
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allure"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    profiles: ["bullmq"]
    image: redis:7
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    profiles: ["bullmq"]
    build: { context: .., dockerfile: docker/Dockerfile }
    command: ["pnpm", "--filter", "@allure-station/server", "start:worker"]
    environment:
      QUEUE_DRIVER: bullmq
      REDIS_URL: redis://redis:6379
      # Worker needs access to the same DB and storage as the API.
      # Uncomment and configure to match the api service environment:
      # DB_DRIVER: postgres
      # DATABASE_URL: postgresql://allure:allure@postgres:5432/allure
      # STORAGE_DRIVER: s3
      # S3_ENDPOINT: http://minio:9000
      # S3_BUCKET: allure
      # S3_ACCESS_KEY_ID: minio
      # S3_SECRET_ACCESS_KEY: minio12345
    depends_on:
      redis:
        condition: service_healthy

volumes:
  allure-data:
  minio-data:
  postgres-data:
  redis-data:
