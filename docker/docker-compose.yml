services:
  allure-station:
    build: { context: .., dockerfile: docker/Dockerfile }
    ports: ["5050:5050"]
    volumes: ["allure-data:/data"]
    # To use S3/MinIO as the storage backend, uncomment and configure:
    # environment:
    #   STORAGE_DRIVER: s3
    #   S3_ENDPOINT: http://minio:9000
    #   S3_BUCKET: allure
    #   S3_ACCESS_KEY_ID: minio
    #   S3_SECRET_ACCESS_KEY: minio12345
    #
    # To use Postgres as the metadata backend (requires --profile postgres):
    #   DB_DRIVER: postgres
    #   DATABASE_URL: postgresql://allure:allure@postgres:5432/allure

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]

  postgres:
    profiles: ["postgres"]
    image: postgres:16
    environment:
      POSTGRES_USER: allure
      POSTGRES_PASSWORD: allure
      POSTGRES_DB: allure
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allure"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  allure-data:
  minio-data:
  postgres-data:
